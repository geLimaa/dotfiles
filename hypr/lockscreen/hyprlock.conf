source = ~/.config/hypr/colors.conf

# BACKGROUND
background {
    monitor =
    path = /home/limaa/.current_wallpaper

    blur_passes = 3
    blur_size = 3

    contrast = 1.0
    brightness = 0.5

    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    grace = 0
    hide_cursor = true
}

# INPUT FIELD
input-field {
    monitor =

    size = 256, 48

    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true

    outer_color = rgb($color6)
    inner_color = rgb($background)

    font_color = rgb($foreground)

    fail_color = rgb($color1)
    check_color = rgb($color5)
    capslock_color = rgb($color4)

    fade_on_empty = false

    font_family = Iosevka Nerd Font
    placeholder_text = Password...

    hide_input = false

    position = 0, -100

    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# TIME
label {
    monitor =

    text = cmd[update:1000] date +"%H:%M:%S"

    color = rgb($foreground)

    font_size = 14
    font_family = Iosevka Nerd Font

    position = 0, -150

    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# USER
label {
    monitor =

    text = cmd[update:1000] sh -c 'echo "$USER@$(hostname)"'

    color = rgb($color5)

    font_size = 18
    font_family = Iosevka Nerd Font

    position = 0, -50

    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# PROFILE PICTURE
image {
    path = /home/limaa/.face.icon

    size = 180

    position = 0, 75

    halign = center
    valign = center

    border_size = 3
    border_color = rgb($color6)

    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}
